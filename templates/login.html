<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Knowledge Base</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--pico-background-color); }
    .login-box { width: 100%; max-width: 380px; padding: 2rem; }
    .login-box h1 { text-align: center; margin-bottom: 0.3rem; }
    .login-box .subtitle { text-align: center; color: var(--pico-muted-color); margin-bottom: 1.5rem; font-size: 0.9rem; }
    .flash-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 0.5rem 0.8rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <article>
      <h1>📚</h1>
      <h2 style="text-align:center">Knowledge Base</h2>
      <p class="subtitle">Sign in to continue</p>
      {% for category, message in get_flashed_messages(with_categories=true) %}
        <div class="flash-{{ category }}">{{ message }}</div>
      {% endfor %}
      <form method="post">
        <label>Username
          <input type="text" name="username" autofocus required>
        </label>
        <label>Password
          <input type="password" name="password" required>
        </label>
        <button type="submit" style="width:100%">Sign In</button>
      </form>
    </article>
  </div>
  <script>
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
  </script>
</body>
</html>
