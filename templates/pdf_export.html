<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ article.title }}</title>
  <style>
    body { font-family: Georgia, serif; font-size: 12pt; color: #000; padding: 2cm; }
    h1 { font-size: 22pt; margin-bottom: 0.2cm; }
    .meta { font-size: 9pt; color: #666; margin-bottom: 1cm; border-bottom: 1px solid #ccc; padding-bottom: 0.3cm; }
    .tags { font-size: 9pt; color: #444; margin-bottom: 0.5cm; }
    .tag { background: #eee; padding: 2px 6px; border-radius: 10px; margin-right: 4px; }
    img { max-width: 100%; }
    table { border-collapse: collapse; width: 100%; }
    td, th { border: 1px solid #ccc; padding: 0.2cm; }
    pre { background: #f5f5f5; padding: 0.3cm; overflow-x: auto; font-size: 10pt; }
    code { background: #f0f0f0; padding: 1px 4px; font-size: 10pt; }
    blockquote { border-left: 3px solid #ccc; margin-left: 0; padding-left: 0.5cm; color: #555; }
  </style>
</head>
<body>
  <h1>{{ article.title }}</h1>
  <div class="meta">
    Created: {{ article.created_at[:10] }} · Last updated: {{ article.updated_at[:10] }}
  </div>
  {% if article.tags %}
  <div class="tags">
    Tags:
    {% for tag in article.tags.split(',') %}{% if tag.strip() %}
      <span class="tag">{{ tag.strip() }}</span>
    {% endif %}{% endfor %}
  </div>
  {% endif %}
  <div class="content">
    {{ article.body|safe }}
  </div>
</body>
</html>
